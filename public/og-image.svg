<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- Border -->
  <rect x="2" y="2" width="1196" height="626" rx="0" fill="none" stroke="#334155" stroke-width="2"/>

  <!-- Logo box -->
  <rect x="80" y="80" width="52" height="52" rx="12" fill="#22c55e"/>
  <text x="106" y="116" text-anchor="middle" font-size="28" fill="#000">🌿</text>

  <!-- Brand name -->
  <text x="148" y="117" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">NYC Weed Prices</text>

  <!-- Badge -->
  <rect x="80" y="160" width="160" height="28" rx="14" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.35)" stroke-width="1"/>
  <text x="160" y="179" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="700" fill="#22c55e" letter-spacing="0.8">LIVE NYC DATA</text>

  <!-- Main headline -->
  <text x="80" y="280" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="64" font-weight="800" fill="url(#text-grad)" letter-spacing="-1">Find the Cheapest</text>
  <text x="80" y="356" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="64" font-weight="800" fill="url(#text-grad)" letter-spacing="-1">Weed in NYC</text>

  <!-- Subtitle -->
  <text x="80" y="416" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="22" fill="#94a3b8">Compare flower prices across licensed Manhattan dispensaries.</text>
  <text x="80" y="446" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="22" fill="#94a3b8">Updated daily. Free. No signup required.</text>

  <!-- Price cards on right -->
  <rect x="760" y="200" width="360" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="760" y="200" width="4" height="70" rx="2" fill="#22c55e"/>
  <text x="782" y="228" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="13" fill="#64748b" font-weight="700">CHEAPEST OZ TODAY</text>
  <text x="782" y="256" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="28" font-weight="800" fill="#22c55e">$199</text>
  <text x="840" y="256" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="14" fill="#94a3b8">/ oz · Stoops NYC</text>

  <rect x="760" y="288" width="360" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="760" y="288" width="4" height="70" rx="2" fill="#a78bfa"/>
  <text x="782" y="316" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="13" fill="#64748b" font-weight="700">CHEAPEST HALF OZ</text>
  <text x="782" y="344" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="28" font-weight="800" fill="#a78bfa">$100</text>
  <text x="850" y="344" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="14" fill="#94a3b8">/ ½ oz · Housing Works</text>

  <rect x="760" y="376" width="360" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="760" y="376" width="4" height="70" rx="2" fill="#fbbf24"/>
  <text x="782" y="404" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="13" fill="#64748b" font-weight="700">STORES TRACKED</text>
  <text x="782" y="432" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="28" font-weight="800" fill="#fbbf24">17</text>
  <text x="830" y="432" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="14" fill="#94a3b8">licensed dispensaries</text>

  <!-- URL footer -->
  <text x="80" y="554" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="18" fill="#22c55e" font-weight="600">nycweedprice.org</text>
</svg>
